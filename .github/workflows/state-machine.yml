name: State Machine Automation

on:
  issues:
    types: [opened, labeled, unlabeled, assigned, closed, reopened]
  pull_request:
    types: [opened, labeled, unlabeled, closed, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  initial-triage:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    name: Initial Triage

    steps:
      - name: Auto-assign priority
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            let priority = '📊 priority:P2-Medium';

            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();

            if (title.includes('critical') || body.includes('production down') || body.includes('security')) {
              priority = '📊 priority:P0-Critical';
            } else if (title.includes('urgent') || title.includes('bug') || body.includes('broken')) {
              priority = '⚠️ priority:P1-High';
            } else if (title.includes('enhancement') || title.includes('feature')) {
              priority = '📊 priority:P2-Medium';
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [priority, '📥 state:pending']
            });

  pr-created:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    name: PR Created - Start Review

    steps:
      - name: Find linked issue
        id: find-issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/#(\d+)/);
            if (match) {
              return match[1];
            }
            return null;
          result-encoding: string

      - name: Add review label to PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['👀 state:reviewing']
            });

  pr-merged:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    name: PR Merged - Mark Done

    steps:
      - name: Find linked issue
        id: find-issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/[Cc]loses?\s+#(\d+)/);
            if (match) {
              return match[1];
            }
            return null;
          result-encoding: string

      - name: Mark linked issue as done
        if: steps.find-issue.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.find-issue.outputs.result }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['✅ state:done']
            });

  blocked-escalation:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      contains(github.event.label.name, 'state:blocked')
    name: Blocked - Escalate

    steps:
      - name: Create escalation comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🚨 **BLOCKED - Guardian Escalation**\n\nThis issue has been marked as blocked and requires intervention.\n\n@${context.repo.owner} - Please review and resolve.`
            });
