services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vimeo-brain-postgres
    environment:
      POSTGRES_DB: vimeo_brain
      POSTGRES_USER: vimeo
      POSTGRES_PASSWORD: vimeo
    ports:
      - "5434:5432"
    volumes:
      - vimeo-brain-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vimeo -d vimeo_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: vimeo-brain-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://vimeo:vimeo@postgres:5432/vimeo_brain
      VIMEO_ACCESS_TOKEN: ${VIMEO_ACCESS_TOKEN:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VIMEO_WEBHOOK_SECRET: ${VIMEO_WEBHOOK_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      CHATWORK_API_TOKEN: ${CHATWORK_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: vimeo-brain-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vimeo-brain-pgdata:
